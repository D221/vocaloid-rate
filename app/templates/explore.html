{% extends "base.html" %}

{% block title %}{{ _('Explore') }} - {{ _('Vocaloid Rate') }}{% endblock %}

{% block content %}
  {% set title = _("Explore") %}
  {% include "partials/header.html" %}

  <div class="mx-auto my-8 max-w-4xl p-4">
    <h1 class="text-3xl font-bold text-header">{{ _('Explore') }}</h1>
    
    <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
      <a href="/playlists" class="rounded border border-border bg-card-bg p-6 shadow-md hover:bg-cyan-hover transition-colors text-center">
        <h2 class="text-xl font-bold text-cyan-text">{{ _('Playlists') }}</h2>
      </a>
      <a href="/producers" class="rounded border border-border bg-card-bg p-6 shadow-md hover:bg-cyan-hover transition-colors text-center">
        <h2 class="text-xl font-bold text-cyan-text">{{ _('Producers') }}</h2>
      </a>
      <a href="/voicebanks" class="rounded border border-border bg-card-bg p-6 shadow-md hover:bg-cyan-hover transition-colors text-center">
        <h2 class="text-xl font-bold text-cyan-text">{{ _('Voicebanks') }}</h2>
      </a>
    </div>
  </div>
{% endblock %}
