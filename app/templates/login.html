{% extends "base.html" %}

{% block content %}
  <div class="container mx-auto max-w-md px-4 py-8">
    <form
      hx-post="/token"
      hx-trigger="submit"
      hx-swap="none"
      hx-on:htmx:after-request="handleAuthResponse(event)"
      class="rounded-lg border border-border bg-card-bg px-8 pt-6 pb-8 shadow-md"
    >
      <h1 class="mb-6 text-center text-3xl font-bold text-header">
        {{ _('Login') }}
      </h1>

      {% if error_message %}
        <p
          data-auth-error
          class="mb-4 rounded border border-red-text/40 bg-red-hover px-3 py-2 text-sm text-red-text"
        >
          {{ error_message }}
        </p>
      {% endif %}

      <div class="mb-4">
        <label
          class="mb-2 block text-sm font-bold text-foreground"
          for="username"
        >
          {{ _('Email') }}
        </label>
        <input
          class="w-full appearance-none rounded border border-border bg-background px-3 py-2 leading-tight text-foreground shadow focus:border-cyan-text focus:outline-none"
          id="username"
          name="username"
          type="email"
          placeholder="{{ _('Your Email') }}"
          required
        />
      </div>

      <div class="mb-6">
        <label
          class="mb-2 block text-sm font-bold text-foreground"
          for="password"
        >
          {{ _('Password') }}
        </label>
        <input
          class="mb-3 w-full appearance-none rounded border border-border bg-background px-3 py-2 leading-tight text-foreground shadow focus:border-cyan-text focus:outline-none"
          id="password"
          name="password"
          type="password"
          placeholder="{{ _('Your Password') }}"
          required
        />
      </div>

      <div class="flex items-center justify-between">
        <button
          class="cursor-pointer rounded border border-cyan-text p-2 font-bold text-cyan-text shadow-md ease-in-out hover:transition-colors hover:duration-200 enabled:hover:bg-cyan-hover"
          type="submit"
        >
          {{ _('Login') }}
        </button>
        <a
          class="inline-block align-baseline text-sm font-bold text-cyan-text hover:underline"
          href="/register"
        >
          {{ _("Don't have an account?") }} {{ _('Register') }}
        </a>
      </div>
    </form>
  </div>

  <script>
    function handleAuthResponse(event) {
      console.log("HTMX Auth Response Event:", event.detail);
      if (event.detail.successful) {
        console.log("Authentication successful");
        // Authentication successful, redirect to home or dashboard
        window.location.href = "/";
      } else {
        // Authentication failed, display error message
        const response = event.detail.xhr.response;
        console.error("Authentication failed. Server response:", response);
        let errorMessage = "{{ _('An unknown error occurred.') }}";
        try {
          const errorData = JSON.parse(response);
          errorMessage = errorData.detail || errorMessage;
        } catch (e) {
          console.error("Failed to parse error response:", e);
        }
        const form = event.detail.elt;
        let errorParagraph = form.querySelector("[data-auth-error]");
        if (!errorParagraph) {
          errorParagraph = document.createElement("p");
          errorParagraph.dataset.authError = "true";
          errorParagraph.className =
            "mb-4 rounded border border-red-text/40 bg-red-hover px-3 py-2 text-sm text-red-text";
          form.prepend(errorParagraph);
        }
        errorParagraph.textContent = errorMessage;
      }
    }
  </script>
{% endblock %}
