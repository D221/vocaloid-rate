{% extends "base.html" %}

{% block content %}
  <div class="container mx-auto max-w-md px-4 py-8">
    <form
      hx-post="/users/"
      hx-trigger="submit"
      hx-ext="json-enc"
      hx-swap="none"
      hx-on:htmx:after-request="handleRegisterResponse(event)"
      class="rounded-lg border border-border bg-card-bg px-8 pt-6 pb-8 shadow-md"
    >
      <h1 class="mb-6 text-center text-3xl font-bold text-header">
        {{ _('Register') }}
      </h1>

      {% if error_message %}
        <p
          data-register-error
          class="mb-4 rounded border border-red-text/40 bg-red-hover px-3 py-2 text-sm text-red-text"
        >
          {{ error_message }}
        </p>
      {% endif %}

      <div class="mb-4">
        <label class="mb-2 block text-sm font-bold text-foreground" for="email">
          {{ _('Email') }}
        </label>
        <input
          class="w-full appearance-none rounded border border-border bg-background px-3 py-2 leading-tight text-foreground shadow focus:border-sky-text focus:outline-none"
          id="email"
          name="email"
          type="email"
          placeholder="{{ _('Your Email') }}"
          required
        />
      </div>

      <div class="mb-6">
        <label
          class="mb-2 block text-sm font-bold text-foreground"
          for="password"
        >
          {{ _('Password') }}
        </label>
        <input
          class="mb-3 w-full appearance-none rounded border border-border bg-background px-3 py-2 leading-tight text-foreground shadow focus:border-sky-text focus:outline-none"
          id="password"
          name="password"
          type="password"
          placeholder="{{ _('Choose a strong password') }}"
          required
        />
      </div>

      <div class="mb-6">
        <label
          class="mb-2 block text-sm font-bold text-foreground"
          for="confirm_password"
        >
          {{ _('Confirm Password') }}
        </label>
        <input
          class="mb-3 w-full appearance-none rounded border border-border bg-background px-3 py-2 leading-tight text-foreground shadow focus:border-sky-text focus:outline-none"
          id="confirm_password"
          type="password"
          placeholder="{{ _('Repeat your password') }}"
          required
        />
      </div>

      <div class="flex items-center justify-between">
        <button
          class="cursor-pointer rounded border border-sky-text p-2 font-bold text-sky-text shadow-md ease-in-out hover:transition-colors hover:duration-200 enabled:hover:bg-sky-hover"
          type="submit"
        >
          {{ _('Register') }}
        </button>
        <a
          class="inline-block align-baseline text-sm font-bold text-cyan-text hover:underline"
          href="/login"
        >
          {{ _('Already have an account?') }} {{ _('Login') }}
        </a>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector('form[hx-post="/users/"]');
      if (!form) return;

      const showMismatchError = () => {
        let errorParagraph = form.querySelector("[data-register-error]");
        if (!errorParagraph) {
          errorParagraph = document.createElement("p");
          errorParagraph.dataset.registerError = "true";
          errorParagraph.className =
            "mb-4 rounded border border-red-text/40 bg-red-hover px-3 py-2 text-sm text-red-text";
          form.prepend(errorParagraph);
        }
        errorParagraph.textContent = "{{ _('Passwords do not match.') }}";
      };

      const passwordsMatch = () => {
        const passwordInput = form.querySelector("#password");
        const confirmPasswordInput = form.querySelector("#confirm_password");
        if (!passwordInput || !confirmPasswordInput) return true;
        return passwordInput.value === confirmPasswordInput.value;
      };

      form.addEventListener(
        "submit",
        (event) => {
          const confirmPasswordInput = form.querySelector("#confirm_password");
          if (passwordsMatch()) return;

          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          showMismatchError();
          confirmPasswordInput?.focus();
        },
        true,
      );

      form.addEventListener("htmx:beforeRequest", (event) => {
        const confirmPasswordInput = form.querySelector("#confirm_password");
        if (passwordsMatch()) return;

        event.preventDefault();
        showMismatchError();
        confirmPasswordInput?.focus();
      });
    });

    function handleRegisterResponse(event) {
      console.log("HTMX Register Response Event:", event.detail);
      if (event.detail.successful) {
        console.log("Registration successful, redirecting to home");
        window.location.href = "/";
      } else {
        // Registration failed, display error message
        const response = event.detail.xhr.response;
        console.error("Registration failed. Server response:", response);
        let errorMessage = "{{ _('An unknown error occurred.') }}";
        try {
          const errorData = JSON.parse(response);
          errorMessage = errorData.detail || errorMessage;
        } catch (e) {
          console.error("Failed to parse error response:", e);
        }
        const form = event.detail.elt;
        let errorParagraph = form.querySelector("[data-register-error]");
        if (!errorParagraph) {
          errorParagraph = document.createElement("p");
          errorParagraph.dataset.registerError = "true";
          errorParagraph.className =
            "mb-4 rounded border border-red-text/40 bg-red-hover px-3 py-2 text-sm text-red-text";
          form.prepend(errorParagraph);
        }
        errorParagraph.textContent = errorMessage;
      }
    }
  </script>
{% endblock %}
